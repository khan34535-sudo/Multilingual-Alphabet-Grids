<!doctype html>
<html lang="ar" dir="rtl">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Arabic Alphabet Sound Grid</title>
  <style>
    /* --- NAVIGATION BAR STYLING --- */
    .nav-bar {
      text-align: center; 
      padding: 15px; 
      background-color: #1a1a1a; 
      border-bottom: 2px solid #333;
      width: 100%;
      position: sticky;
      top: 0;
      z-index: 1000;
      direction: ltr; /* Keeps the menu order consistent (English, Arabic, French) */
    }
    .nav-bar a {
      margin: 0 20px; 
      text-decoration: none; 
      font-weight: bold; 
      color: #FF6B6B; 
      font-family: sans-serif;
      font-size: 1.2rem;
    }
    .nav-bar a:hover {
      color: #ffffff;
      text-decoration: underline;
    }

    body {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      font-family: 'Traditional Arabic', 'Arial', sans-serif;
      background: #000000 !important;
      display: flex;
      flex-direction: column;
      align-items: center;
      /* Changed to flex-start to accommodate the menu */
      justify-content: flex-start;
      overflow-y: auto;
      direction: rtl;
    }

    html {
      height: 100%;
      width: 100%;
    }

    .container {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
      box-sizing: border-box;
    }

    h1 {
      color: #ffffff;
      font-size: 4em;
      margin: 20px 0 10px 0;
      text-align: center;
      font-weight: 900;
      line-height: 1.2;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 15px;
      width: 90%;
      max-width: 1000px;
      margin: 20px auto;
      direction: rtl;
    }

    .letter-box {
      aspect-ratio: 1;
      border-radius: 15px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3.5em;
      font-weight: 900;
      color: #ffffff;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
      user-select: none;
    }

    .letter-box:hover {
      transform: scale(1.1);
      box-shadow: 0 6px 12px rgba(255, 255, 255, 0.2);
    }

    .speaking {
      animation: pulse 0.6s ease-in-out;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.15); box-shadow: 0 0 40px rgba(255, 255, 255, 0.9); }
    }

    .subtitle {
      color: #ffffff;
      font-size: 1.8em;
      margin-bottom: 20px;
      text-align: center;
      opacity: 0.85;
    }

    @media (max-width: 768px) {
      .grid { grid-template-columns: repeat(4, 1fr); }
      h1 { font-size: 3em; }
    }
  </style>
 </head>
 <body>

  <div class="nav-bar">
      <a href="index.html">English</a>
      <a href="arabic.html" style="color: #ffffff; border-bottom: 2px solid white;">Arabic</a>
      <a href="french.html">French</a>
  </div>

  <div class="container">
   <h1 id="title">الأبجدية العربية</h1>
   <div class="subtitle">اضغط على أي حرف لسماع صوته</div>
   <div class="grid" id="letterGrid"></div>
  </div>

  <script>
    const colors = [
      '#FF6B6B', '#4ECDC4', '#45B7D1', '#FFA07A', '#98D8C8',
      '#F7DC6F', '#BB8FCE', '#85C1E2', '#F8B500', '#FF69B4'
    ];

    const alphabet = ['ا', 'ب', 'ت', 'ث', 'ج', 'ح', 'خ', 'د', 'ذ', 'ر', 'ز', 'س', 'ش', 'ص', 'ض', 'ط', 'ظ', 'ع', 'غ', 'ف', 'ق', 'ك', 'ل', 'م', 'ن', 'ه', 'و', 'ي'];

    function createGrid() {
      const grid = document.getElementById('letterGrid');
      alphabet.forEach((letter, index) => {
        const box = document.createElement('div');
        box.className = 'letter-box';
        box.textContent = letter;
        box.style.background = colors[index % colors.length];
        box.addEventListener('click', () => speakLetter(letter, box));
        grid.appendChild(box);
      });
    }

    function speakLetter(letter, element) {
      element.classList.add('speaking');
      setTimeout(() => element.classList.remove('speaking'), 600);
      
      if ('speechSynthesis' in window) {
        window.speechSynthesis.cancel();
        
        const arabicPronunciation = {
          'ا': 'حرف ألف, أ', 'ب': 'حرف باء, بَ', 'ت': 'حرف تاء, تَ', 'ث': 'حرف ثاء, ثَ',
          'ج': 'حرف جيم, جَ', 'ح': 'حرف حاء, حَ', 'خ': 'حرف خاء, خَ', 'د': 'حرف دال, دَ',
          'ذ': 'حرف ذال, ذَ', 'ر': 'حرف راء, رَ', 'ز': 'حرف زاي, زَ', 'س': 'حرف سين, سَ',
          'ش': 'حرف شين, شَ', 'ص': 'حرف صاد, صَ', 'ض': 'حرف ضاد, ضَ', 'ط': 'حرف طاء, طَ',
          'ظ': 'حرف ظاء, ظَ', 'ع': 'حرف عين, عَ', 'غ': 'حرف غين, غَ', 'ف': 'حرف فاء, فَ',
          'ق': 'حرف قاف, قَ', 'ك': 'حرف كاف, كَ', 'ل': 'حرف لام, لَ', 'م': 'حرف ميم, مَ',
          'ن': 'حرف نون, نَ', 'ه': 'حرف هاء, هَ', 'و': 'حرف واو, وَ', 'ي': 'حرف ياء, يَ'
        };
        
        const utterance = new SpeechSynthesisUtterance();
        utterance.text = arabicPronunciation[letter];
        utterance.lang = 'ar-SA';
        utterance.rate = 0.7;
        
        const voices = speechSynthesis.getVoices();
        const arabicVoice = voices.find(voice => voice.lang.startsWith('ar'));
        if (arabicVoice) utterance.voice = arabicVoice;
        
        window.speechSynthesis.speak(utterance);
      }
    }

    createGrid();
  </script>
 </body>
</html>
